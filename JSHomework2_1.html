    <title>第二個回家練習 第一題</title>
    <script>
        function caculate() {
            let sum = 0;
            for (i = 1; i <= 50; i = i + 2) {
                sum = sum + i * i;
                sum = sum - ((i + 1) * (i + 1));
            }
            document.write(sum);
        }
        caculate();
    </script>
