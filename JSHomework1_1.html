<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一次JS作業 第一題</title>
    <script>
        let month = "1";
        switch (month) {
            case "1":
            case "2":
            case "12":
                document.write("冬天")
                console.log("冬天");
                break;
            case "3":
            case "4":
            case "5":
                document.write("春天")
                console.log("春天");
                break;
            case "6":
            case "7":
            case "8":
                document.write("夏天")
                console.log("夏天");
                break;
            case "9":
            case "10":
            case "11":
                document.write("秋天")
                console.log("秋天");
                break;
            default:
                document.write("輸入錯誤")
                console.log("輸入錯誤");
        }
    </script>
</head>

<body>

</body>

</html>
