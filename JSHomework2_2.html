<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二個練習第二題</title>
    <script>
        let x = 36;
        function findFactor(number) {
            for (let i = 1; i <= number; i++) {
                if (number % i == 0) {
                    document.write(i + ",");
                }
            }
        }
        findFactor(x);
    </script>
</head>
